formatters:
  enable:
    - gci
    - gofumpt
  exclusions:
    generated: lax
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/shirou)
issues:
  max-same-issues: 0
linters:
  disable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  enable:
    - asciicheck
    - contextcheck
    - durationcheck
    - errorlint
    - gocritic
    - gomodguard
    - gosec
    - importas
    - misspell
    - nakedret
    - nolintlint
    - perfsprint
    - predeclared
    - revive
    - testifylint
    - thelper
    - unparam
    - usetesting
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
  settings:
    gocritic:
      disabled-checks:
        - captLocal
    gomodguard:
      blocked:
        modules:
          - io/ioutil:
              recommendations:
                - io
                - os
    gosec:
      excludes:
        - G115
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
          arguments:
            - allowTypesBefore: '*testing.T'
        - name: context-keys-type
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
          arguments:
            - preserveScope
        - name: empty-block
          disabled: true
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
          arguments:
            - preserveScope
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: redundant-import-alias
        - name: superfluous-else
          arguments:
            - preserveScope
        - name: time-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: use-any
        - name: var-declaration
        - name: var-naming
          arguments:
            - - ID
            - - VM
            - - upperCaseConst: true
    testifylint:
      disable:
        - useless-assert # TODO: enable once golangci-lint > 2.0.2
      enable-all: true
    usetesting:
      os-create-temp: false
      os-mkdir-temp: false
output:
  show-stats: false      
run:
  timeout: 5m
version: "2"
